[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/payment/order"
  to = "/.netlify/functions/payment-order"
  status = 200

[[redirects]]
  from = "/api/payment/verify"
  to = "/.netlify/functions/payment-verify"
  status = 200

[[redirects]]
  from = "/api/payment/finalize"
  to = "/.netlify/functions/payment-finalize"
  status = 200

[[redirects]]
  from = "/api/notify/order-email"
  to = "/.netlify/functions/send-order-email"
  status = 200

[[redirects]]
  from = "/api/notify/order-status"
  to = "/.netlify/functions/send-order-status-email"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
